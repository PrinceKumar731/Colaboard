spring:
  application:
    name: code-judge-engine

  datasource:
    url: jdbc:h2:mem:codejudge;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

server:
  port: 8080
  error:
    include-message: always

judge:
  docker:
    java-image: judge-java:latest
    python-image: judge-python:latest
    cpp-image: judge-cpp:latest
  execution:
    temp-dir: /tmp/judge
  queue:
    workers: 3

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.codejudge: INFO
    org.hibernate.SQL: WARN
